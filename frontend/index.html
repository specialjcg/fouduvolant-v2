<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fou du Volant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary:#4F46E5; --primary-d:#4338CA; --primary-l:#6366F1;
      --accent:#14B8A6; --accent-d:#0D9488;
      --success:#10B981; --warning:#F59E0B; --danger:#EF4444;
      --bg:#F8FAFC; --surface:#FFFFFF; --surface-2:#F1F5F9; --accent-bg:#EEF2FF;
      --fg:#0F172A; --muted:#64748B; --faint:#94A3B8; --line:#E2E8F0;
      --r-sm:6px; --r-md:8px; --r-lg:12px; --r-xl:16px; --r-full:9999px;
      --sh-sm:0 1px 2px rgb(0 0 0 /.05);
      --sh:0 1px 3px rgb(0 0 0 /.08), 0 1px 2px rgb(0 0 0 /.04);
      --sh-md:0 8px 24px -10px rgb(15 23 42 /.18);
      --gold1:#fbe28a; --gold2:#d9a441; --gold3:#7a5a1c; --dark:#0a0a0c;
    }
    * { box-sizing:border-box; }
    html { background:var(--bg); -webkit-text-size-adjust:100%; }
    body {
      margin:0; background:var(--bg); color:var(--fg);
      font-family:"Inter", system-ui, sans-serif; font-size:15px; line-height:1.5;
      min-height:100vh;
    }

    header {
      position:sticky; top:0; z-index:1000; height:4rem;
      display:flex; align-items:center; gap:1rem; padding:0 1.5rem;
      background:rgba(255,255,255,.85); backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    header h1 { margin:0; font-size:1.25rem; font-weight:700; letter-spacing:-.01em; }
    header h1 .accent { color:var(--primary); }

    main { padding:1.5rem; max-width:1100px; margin:0 auto;
      animation:rise .4s cubic-bezier(.2,.7,.2,1) both; }
    @keyframes rise { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }

    h2 { font-size:1.15rem; font-weight:700; margin:0; letter-spacing:-.01em; }
    h3 { font-size:.75rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
      color:var(--muted); margin:.1rem 0 .55rem; }

    .panel {
      background:var(--surface); border:1px solid var(--line); border-radius:var(--r-xl);
      padding:1.25rem 1.35rem; margin-bottom:1.1rem; box-shadow:var(--sh);
    }

    .row { display:flex; gap:.55rem; align-items:center; flex-wrap:wrap; }
    h2 + .row, .row + .row { margin-top:.85rem; }

    /* COURTS — timeline horizontale par terrain */
    .lanes { display:flex; flex-direction:column; gap:.9rem; margin-top:.9rem; }
    .lane { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg);
      padding:.8rem .9rem; box-shadow:var(--sh-sm); }
    .lane-head { display:flex; align-items:center; gap:.6rem; margin-bottom:.55rem; }
    .lane-name { font-size:.78rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--primary); }
    .badge { font-size:.66rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
      padding:.15rem .5rem; border-radius:var(--r-full); }
    .badge.live { background:rgb(239 68 68 /.12); color:#dc2626; }
    .badge.free { background:rgb(16 185 129 /.12); color:#059669; }
    .badge.idle { background:var(--surface-2); color:var(--faint); }
    /* horizontal timeline : ligne + pastilles colorées par état (façon ancien) */
    .track { position:relative; display:flex; gap:.7rem; overflow-x:auto;
      padding:1.5rem .1rem .7rem; scroll-behavior:smooth; }
    .track::before { content:""; position:absolute; left:.3rem; right:.3rem; top:.75rem;
      height:2px; background:var(--line); z-index:0; }
    .node { position:relative; z-index:1; flex:0 0 212px;
      background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md);
      padding:.55rem .65rem; box-shadow:var(--sh-sm); }
    /* pastille sur la ligne */
    .node::before { content:""; position:absolute; top:-1rem; left:50%; transform:translateX(-50%);
      width:13px; height:13px; border-radius:50%; background:var(--faint);
      border:2px solid var(--surface); box-shadow:0 0 0 1px var(--line); }
    .node-head { font-size:.64rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase;
      color:var(--muted); margin-bottom:.25rem; }
    .node-teams { font-size:.9rem; font-weight:600; margin-bottom:.4rem; }

    .node.done { opacity:.62; }
    .node.done::before { background:#94a3b8; box-shadow:0 0 0 1px #94a3b8; }

    .node.live { border:1.5px solid rgb(239 68 68 /.6); background:rgb(239 68 68 /.05); }
    .node.live .node-head { color:var(--danger); }
    .node.live::before { background:var(--danger); border-color:var(--surface);
      animation:pulse 1.6s ease-out infinite; }
    @keyframes pulse {
      0% { box-shadow:0 0 0 0 rgb(239 68 68 /.55); }
      70% { box-shadow:0 0 0 8px rgb(239 68 68 /0); }
      100% { box-shadow:0 0 0 0 rgb(239 68 68 /0); }
    }

    .node.suggest { border:1.5px dashed var(--success); background:rgb(16 185 129 /.05); }
    .node.suggest::before { background:var(--success); box-shadow:0 0 0 1px var(--success); }

    .node.preview { opacity:.62; border-style:dashed; }
    .node.preview::before { background:#cbd5e1; box-shadow:0 0 0 1px #cbd5e1; }

    .node button { padding:.35rem .55rem; font-size:.78rem; width:100%; }
    .node .row { gap:.25rem; flex-wrap:nowrap; }
    .node input.score { width:2.6rem; padding:.35rem .2rem; }

    /* stepper nav */
    .stepper { display:flex; gap:.4rem; flex-wrap:wrap; margin-bottom:1rem; }
    button.step { background:var(--surface); color:var(--muted); border:1px solid var(--line);
      font-size:.8rem; padding:.45rem .8rem; box-shadow:none; }
    button.step:hover { background:var(--surface-2); transform:none; box-shadow:none; }
    button.step.active { background:var(--primary); color:#fff; border-color:var(--primary); }

    /* score steppers */
    .score-entry { display:flex; flex-direction:column; gap:.25rem; }
    .stepper-line { gap:.2rem; flex-wrap:nowrap; align-items:center; }
    button.step-btn { padding:.2rem .45rem; font-size:1rem; line-height:1; width:auto;
      background:var(--surface-2); color:var(--fg); border:1px solid var(--line); box-shadow:none; }
    button.step-btn:hover { background:#e7ecf3; transform:none; box-shadow:none; }

    .match { padding:.55rem .65rem; border-radius:var(--r-md); background:var(--surface-2);
      border:1px solid var(--line); margin:.35rem 0; font-size:.9rem; }
    .match.current { background:rgb(239 68 68 /.07); border:1.5px solid rgb(239 68 68 /.55); }
    .match.next { background:rgb(16 185 129 /.07); border-left:3px solid var(--success); }
    .match.preview { opacity:.6; font-size:.82rem; }
    .rest { color:var(--warning); font-weight:600; }

    button {
      font-family:inherit; font-weight:600; font-size:.88rem;
      background:var(--primary); color:#fff; border:0; border-radius:var(--r-lg);
      padding:.55rem 1.1rem; cursor:pointer;
      transition:transform .15s, box-shadow .2s, background .2s;
    }
    button:hover { background:var(--primary-d); transform:translateY(-1px);
      box-shadow:0 8px 18px -8px rgb(79 70 229 /.55); }
    button:active { transform:translateY(0); }
    button.secondary { background:var(--surface-2); color:var(--fg); border:1px solid var(--line); }
    button.secondary:hover { background:#e7ecf3; box-shadow:none; }
    button:disabled { opacity:.45; cursor:not-allowed; transform:none; box-shadow:none; }
    button.danger { background:var(--danger); color:#fff; }
    button.danger:hover { background:#dc2626; box-shadow:0 8px 18px -8px rgb(239 68 68 /.55); }

    .chip { display:inline-block; padding:.3rem .65rem; border-radius:var(--r-full);
      background:var(--accent-bg); color:var(--primary); font-size:.82rem; font-weight:600;
      border:1px solid var(--line); cursor:grab; user-select:none; }
    .chip:active { cursor:grabbing; }

    input, select, textarea {
      font-family:inherit; font-size:.9rem; color:var(--fg);
      background:var(--surface); border:1px solid var(--line); border-radius:var(--r-md);
      padding:.5rem .65rem; transition:border-color .15s, box-shadow .15s;
    }
    textarea { resize:vertical; margin-bottom:.5rem; }
    input:focus, select:focus, textarea:focus { outline:none; border-color:var(--primary);
      box-shadow:0 0 0 3px rgb(79 70 229 /.15); }
    input.score { width:3.4rem; text-align:center; font-weight:700; }

    a { color:var(--primary); cursor:pointer; text-decoration:none; font-weight:600; }
    a:hover { text-decoration:underline; }

    .err { background:rgb(239 68 68 /.08); color:#b91c1c; border:1px solid rgb(239 68 68 /.3);
      border-left:4px solid var(--danger); }
    .muted { color:var(--muted); }

    .pill { font-size:.7rem; font-weight:600; letter-spacing:.04em; text-transform:uppercase;
      padding:.18rem .55rem; border-radius:var(--r-full);
      background:var(--accent-bg); color:var(--primary); }

    table { width:100%; border-collapse:collapse; margin-top:.3rem; }
    th { text-align:left; padding:.55rem .6rem; font-size:.72rem; font-weight:600;
      letter-spacing:.04em; text-transform:uppercase; color:var(--muted);
      background:var(--surface-2); border-bottom:1px solid var(--line); }
    th:first-child { border-top-left-radius:var(--r-md); }
    th:last-child { border-top-right-radius:var(--r-md); }
    td { padding:.5rem .6rem; border-bottom:1px solid var(--line); font-size:.9rem; }
    tbody tr:hover, table tr:hover { background:var(--accent-bg); }

    .match.row a { font-size:1rem; }

    /* ===== FINALES : thème dark + gold (prestige) ===== */
    .finals {
      background:
        repeating-linear-gradient(135deg, transparent 0 40px, rgba(255,255,255,.012) 40px 41px),
        var(--dark);
      border-color:#1e1e24; color:#e8e8ee;
    }
    .finals h2 { color:#f4d98a; }
    .finals h3 {
      font-family:"Oswald", sans-serif; font-weight:700; letter-spacing:.22em;
      color:var(--gold2); text-transform:uppercase;
    }
    .finals .muted { color:#8a8a96; }
    .finals .match {
      background:linear-gradient(180deg, #f4f4f6, #c0c0c8 55%, #808088);
      color:#161616; border:1px solid #2a2a30; font-weight:600;
    }
    /* nodes already decided (contiennent une flèche) gardent le gris ; on dore via :has */
    .finals .match:has(.muted) { box-shadow:inset 0 0 0 1px rgba(255,255,255,.25); }

    /* ===== Bracket en arbre (colonnes par tour) ===== */
    .finals .bracket {
      display:flex; gap:2.2rem; overflow-x:auto;
      padding:.5rem 0 1rem; align-items:stretch; margin-bottom:1.2rem;
    }
    .finals .round { display:flex; flex-direction:column; min-width:170px; flex:0 0 auto; }
    .finals .round-title {
      font-family:"Oswald", sans-serif; font-size:.68rem; letter-spacing:.18em;
      text-transform:uppercase; color:#8a8a96; text-align:center; margin-bottom:.5rem;
    }
    .finals .round-body { display:flex; flex-direction:column; justify-content:space-around; flex:1; gap:.55rem; }
    .finals .bmatch {
      position:relative; background:linear-gradient(180deg,#26262e,#1a1a20);
      border:1px solid #34343c; border-radius:var(--r-md); overflow:hidden;
    }
    .finals .seed {
      display:flex; align-items:center; padding:.32rem .55rem;
      font-size:.85rem; color:#d6d6de; min-height:1.55rem;
    }
    .finals .seed + .seed { border-top:1px solid #34343c; }
    .finals .seed.win { color:#f4d98a; font-weight:700; background:rgba(244,217,138,.08); }
    .finals .seed .nm { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    /* petit connecteur horizontal vers la colonne suivante */
    .finals .round:not(:last-child) .bmatch::after {
      content:""; position:absolute; right:-1.1rem; top:50%;
      width:1.1rem; height:1px; background:#34343c;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="elm.js"></script>
  <script>
    var apiBase = (location.search.match(/[?&]api=([^&]+)/) || [])[1];
    var app = Elm.Main.init({
      node: document.getElementById("app"),
      flags: {
        apiBase: apiBase ? decodeURIComponent(apiBase) : "",
        open: location.hash.replace(/^#/, ""),
        showPast: localStorage.getItem("showPast") === "1"
      }
    });
    if (app.ports && app.ports.saveShowPast) {
      app.ports.saveShowPast.subscribe(function (v) {
        localStorage.setItem("showPast", v ? "1" : "0");
      });
    }
  </script>
</body>
</html>
