name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (clippy, tests)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: fouduvolant
          POSTGRES_PASSWORD: fouduvolant
          POSTGRES_DB: fouduvolant
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings
      - name: Unit tests
        run: cargo test
      - name: Integration tests (PostgreSQL)
        env:
          DATABASE_URL: postgresql://fouduvolant:fouduvolant@localhost:5432/fouduvolant
        # Single-threaded: the tests share one event store and each runs
        # migrations, which would race on table creation in parallel.
        run: cargo test -- --ignored --test-threads=1

  frontend:
    name: Frontend (elm)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install
        run: npm ci
      - name: Build (elm make)
        run: ./node_modules/.bin/elm make src/Main.elm --output=elm.js
